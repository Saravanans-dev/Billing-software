version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: student-xerox-billing-db
    environment:
      POSTGRES_DB: student_xerox_billing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required. Set it in .env or environment}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-xerox-billing-api
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: student_xerox_billing
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required. Set it in .env or environment}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required. Set it in .env or environment}
      CORS_ORIGIN: ${CORS_ORIGIN:-"*"}
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-xerox-billing-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
