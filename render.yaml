services:
  # ===== Backend API =====
  - type: web
    name: free-backend
    env: node
    nodeVersion: "20"
    healthCheckPath: /api/health
    repo: https://github.com/Saravanans-dev/Billing-software
    branch: main
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        fromService:
          name: free-frontend
          type: static
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: free-db
          property: connectionString
    disk:
      name: uploads
      mountPath: /app/backend/uploads
      sizeGB: 1

  # ===== Frontend Static Site =====
  - type: web
    runtime: static
    name: free-frontend
    repo: https://github.com/Saravanans-dev/Billing-software
    branch: main
    buildCommand: cd frontend && npm install --include=dev && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: free-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: free-db
    databaseName: student_xerox_billing
    user: postgres
    plan: free
