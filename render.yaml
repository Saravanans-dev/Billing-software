services:
  # ===== Backend API =====
  - type: web
    name: free-backend
    env: node
    repo: https://github.com/Saravanans-dev/Billing-software
    branch: main
    buildCommand: cd backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://free-frontend-u0kv.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: free-db
          property: connectionString

  # ===== Frontend Static Site =====
  - type: web
    runtime: static
    name: free-frontend
    repo: https://github.com/Saravanans-dev/Billing-software
    branch: main
    buildCommand: cd frontend && npm install --include=dev && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: free-backend
          type: web
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: free-db
    databaseName: student_xerox_billing
    user: postgres
    plan: free
